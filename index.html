    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #000;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 70px; 
            border-bottom: 1px solid #222;
        }

        .header-logo img { height: 55px; width: auto; }
        .header-title { 
            font-size: 1rem; font-weight: bold; 
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .menu-icon { font-size: 1.8rem; cursor: pointer; }

        /* SEARCH */
        .search-container {
            position: sticky; top: 70px; background-color: #000;
            padding: 10px 15px; z-index: 99; border-bottom: 1px solid #222;
        }
        .search-input {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid #333; background-color: #1a1a1a; color: white;
            box-sizing: border-box; 
        }

        /* MENU */
        #main-menu {
            display: none; background-color: #111; position: fixed;
            top: 70px; width: 100%; height: calc(100vh - 70px);
            z-index: 200; border-top: 1px solid #333;
        }
        .menu-item {
            display: flex; align-items: center; padding: 20px;
            color: white; text-decoration: none; border-bottom: 1px solid #222;
        }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* PRODUCT GRID */
        .product-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px;
        }
        .product-card { background-color: #000; }
        .image-container {
            width: 100%; aspect-ratio: 1/1; background-color: #111;
            border-radius: 6px; overflow: hidden;
            position: relative;
        }
        .product-image { width: 100%; height: 100%; object-fit: cover; }
        .card-info-row { display: flex; justify-content: space-between; padding: 10px 5px; }
        .grid-price { font-weight: bold; }
        .heart-icon { font-size: 1.3rem; color: #666; }
        .heart-icon.active { color: #ff0000; }

        /* LOAD MORE BUTTON */
        .load-more-container {
            text-align: center;
            padding: 20px;
            display: none; 
        }
        .load-more-btn {
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .load-more-btn:hover { background-color: #333; }

        /* MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 1000; overflow-y: auto; flex-direction: column;
        }
        .modal-top-bar { 
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; 
            background: #000; position: sticky; top: 0; z-index: 1001;
        }
        .close-btn { font-size: 2.2rem; cursor: pointer; }

        .slider-wrapper {
            position: relative; width: 100%; background-color: #000; 
            display: flex; align-items: center; justify-content: center;
            min-height: 350px; 
        }
        .modal-image { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .image-counter {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7);
            padding: 5px 12px; border-radius: 20px; font-size: 0.8rem;
        }

        .modal-content { padding: 20px; flex-grow: 1; }
        .modal-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .modal-details { color: #ccc; line-height: 1.6; margin-bottom: 30px; white-space: pre-wrap; }

        .order-btn {
            background-color: #fff; color: #000; text-align: center; padding: 18px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; display: block; 
            font-size: 1.1rem; margin-bottom: 30px;
        }

        /* FOOTER */
        footer {
            background-color: #111;
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid #222;
            margin-top: auto; 
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }
        .social-link {
            color: #fff;
            font-size: 1.8rem;
            transition: color 0.3s;
        }
        .social-link:hover { color: #ccc; }
        
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E1306C; }
        .fa-envelope { color: #EA4335; }

        .copyright { color: #666; font-size: 0.8rem; }
    </style>

        let wishlist = JSON.parse(localStorage.getItem('bikeWish')) || [];
        let displayedLimit = 6; 
        let currentFilteredList = []; 

        function init() {
            currentFilteredList = products; 
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('product-container');
            container.innerHTML = "";
            const listToShow = currentFilteredList.slice(0, displayedLimit);
            
            listToShow.forEach(p => {
                const isLiked = wishlist.includes(p.id);
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `
                    <div class="image-container" onclick="openModal(${p.id})">
                        <img src="${p.images[0]}" class="product-image">
                    </div>
                    <div class="card-info-row">
                        <span class="grid-price">${p.price} AZN</span>
                        <i class="${isLiked?'fas active':'far'} fa-heart heart-icon" onclick="toggleHeart(event, ${p.id})"></i>
                    </div>
                `;
                container.appendChild(div);
            });

            const btnWrapper = document.getElementById('load-more-wrapper');
            // Əgər siyahı limitdən çoxdursa, düyməni göstər
            if (currentFilteredList.length > displayedLimit) {
                btnWrapper.style.display = 'block';
            } else {
                btnWrapper.style.display = 'none';
            }
        }

        function loadMoreItems() {
            displayedLimit += 6; 
            renderGrid();
        }

        function toggleHeart(e, id) {
            e.stopPropagation();
            const idx = wishlist.indexOf(id);
            if(idx>-1) wishlist.splice(idx,1); else wishlist.push(id);
            localStorage.setItem('bikeWish', JSON.stringify(wishlist));
            e.target.classList.toggle('fas'); e.target.classList.toggle('far'); e.target.classList.toggle('active');
        }

        function toggleMenu() {
            const m = document.getElementById('main-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function showPage(page) {
            toggleMenu();
            if(page === 'home') {
                displayedLimit = 6;
                currentFilteredList = products;
                document.getElementById('searchInput').value = ""; // Axtarışı təmizlə
                renderGrid();
            } else if (page === 'wishlist') {
                // İstək siyahısındakı ID-lərə uyğun məhsulları filterləyirik
                currentFilteredList = products.filter(p => wishlist.includes(p.id));
                displayedLimit = 6; // Standart limitlə başla
                renderGrid();
            }
        }

        let curProd = null, curImgIdx = 0;
        function openModal(id) {
            curProd = products.find(p => p.id === id); curImgIdx = 0;
            updateSlider();
            document.getElementById('modal-name').innerText = curProd.name;
            document.getElementById('modal-details').innerText = curProd.details;
            
            // Format message for WhatsApp
            const msg = `Salam, mən bu məhsulu sifariş etmək istəyirəm: ${curProd.name}`;
            const encodedMsg = encodeURIComponent(msg);
            document.getElementById('modal-whatsapp-btn').href = `https://wa.me/994552345510?text=${encodedMsg}`;
            
            document.getElementById('product-modal').style.display = 'flex';
        }
        function updateSlider() {
            document.getElementById('modal-img').src = curProd.images[curImgIdx];
            document.getElementById('img-counter').innerText = `${curImgIdx+1} / ${curProd.images.length}`;
        }
        function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }

        let startX = 0;
        document.getElementById('swipe-area').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('swipe-area').addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if(startX > endX + 50) { curImgIdx = (curImgIdx+1)%curProd.images.length; updateSlider(); }
            if(startX < endX - 50) { curImgIdx = (curImgIdx-1+curProd.images.length)%curProd.images.length; updateSlider(); }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            currentFilteredList = products.filter(p => p.name.toLowerCase().includes(val));
            displayedLimit = 6; 
            renderGrid();
        });

        init();
    </script>
